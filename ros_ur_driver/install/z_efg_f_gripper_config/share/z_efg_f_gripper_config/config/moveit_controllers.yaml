# MoveIt uses this configuration for controller management
moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager

moveit_simple_controller_manager:
  controller_names:
    - gripper_joint_controller  # 替换为新的多关节控制器名称

  gripper_joint_controller:
    type: FollowJointTrajectory  # 替换为多关节轨迹控制器类型
    joints:
      - finger_left_joint
      - finger_right_joint  # 保留双关节
    action_ns: follow_joint_trajectory  # 匹配JointTrajectoryController的action名称
    default: true

