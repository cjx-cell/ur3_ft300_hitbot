controller_names:
  - scaled_joint_trajectory_controller
  - joint_trajectory_controller
  - gripper_dummy_controller

scaled_joint_trajectory_controller:
  action_ns: follow_joint_trajectory
  type: FollowJointTrajectory
  default: true
  joints:
    - shoulder_pan_joint
    - shoulder_lift_joint
    - elbow_joint
    - wrist_1_joint
    - wrist_2_joint
    - wrist_3_joint

joint_trajectory_controller:
  action_ns: follow_joint_trajectory
  type: FollowJointTrajectory
  default: false
  joints:
    - shoulder_pan_joint
    - shoulder_lift_joint
    - elbow_joint
    - wrist_1_joint
    - wrist_2_joint
    - wrist_3_joint

# 适配IO控制器的配置
gripper_dummy_controller:
  type: "FollowJointTrajectory"  # 匹配ActionServer类型
  default: false
  action_ns: follow_joint_trajectory
  joints:
    - z_efg_f_finger_left_joint
    - z_efg_f_finger_right_joint
  groups: ["gripper"]
